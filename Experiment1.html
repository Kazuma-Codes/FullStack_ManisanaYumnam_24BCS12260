            <p>Company: XYZ Solutions</p>

        </div>

        <div class="job-card">
            <h3>Data Analyst</h3>
            <p>Company: DataCorp</p>
            <p>Location: Remote</p>
            <button>Apply</button>
        </div>

    </section>
